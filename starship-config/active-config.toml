# This will show the time on a 2nd line
# Add a "\" at the end of an item, if you want the next item to show on the same line
format = """
$username\
$hostname\
$time\
$all\
$directory
$character
"""

[character]
success_symbol = '[❯❯❯❯](#ff9d00 bold)'
error_symbol = '[XXXX](#c96d00 bold)'
vicmd_symbol = '[❮❮❮❮](#00e65c bold)'

[battery]
disabled = true

[gcloud]
disabled = true

[time]
style = '#00e65c bold'
disabled = false
format = '[\[$time\]]($style) '
# https://docs.rs/chrono/0.4.7/chrono/format/strftime/index.html
# %T	00:34:60	Hour-minute-second format. Same to %H:%M:%S.
# time_format = '%y/%m/%d %T'
time_format = '%y/%m/%d'

# For this to show up correctly, you need to have cluster access
# So your ~/.kube/config needs to be configured on the local machine
[kubernetes]
disabled = true
# context = user@cluster
# format = '[$user@$cluster \($namespace\)](#98ff98) '
# format = '[$cluster \($namespace\)](#98ff98) '
# Apply separate colors for cluster and namespace
format = '[$cluster](#98ff98 bold) [$namespace](#ff9d00 bold) '
# format = 'on [⛵ ($user on )($cluster in )$context \($namespace\)](dimmed green) '
# Only dirs that have this file inside will show the kubernetes prompt
# detect_files = ['900-detectkubernetes.sh']
# detect_env_vars = ['STAR_USE_KUBE']
# contexts = [
#   { context_pattern = "dev.local.cluster.k8s", style = "green", symbol = "💔 " },
# ]

[username]
style_user = '#00e65c bold'
style_root = 'white bold'
format = '[$user]($style).@.'
show_always = true

[hostname]
ssh_only = true
format = '(white bold)[$hostname](#ff9d00 bold)'

[directory]
style = '#66ff99 bold'
truncation_length = 0
truncate_to_repo = false

[ruby]
detect_variables = []
detect_files = ['Gemfile', '.ruby-version']
